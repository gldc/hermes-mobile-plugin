name: hermes-mobile
kind: platform
version: 0.1.0
description: >
  Mobile companion plugin for hermes-agent: QR-paired per-device dashboard
  auth (rotating ~15-min access tokens, 30-day refresh tokens with reuse
  detection, individually revocable), a `hermes mobile` CLI for pairing and
  device management, a `mobile` platform adapter delivering to per-device
  mailboxes with redacted Expo push notifications, and a dashboard API
  (/api/plugins/mobile — push-token, mailbox sync, device self-info,
  declared in dashboard/manifest.json).
author: GianLuca D'Intino-Conte (https://github.com/gldc)
requires_env: []
optional_env: []
provides_tools: []
provides_hooks: []
